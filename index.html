<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>設備點班系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <style>
    body { background: #f0f4f8; }
    .status-btn { transition: all .2s; }
    .status-btn.selected-ok  { @apply bg-green-500 text-white border-green-500; }
    .status-btn.selected-err { @apply bg-red-500   text-white border-red-500;   }
    canvas#sigCanvas { touch-action: none; }
  </style>
</head>
<body class="min-h-screen py-8 px-4">

  <!-- ── 標題卡 ── -->
  <div class="max-w-2xl mx-auto mb-6 text-center">
    <h1 class="text-3xl font-bold text-gray-800 tracking-wide">🛠️ 設備點班系統</h1>
    <p id="nowTime" class="text-sm text-gray-500 mt-1"></p>
  </div>

  <form id="shiftForm" class="max-w-2xl mx-auto space-y-4" onsubmit="return false;">

    <!-- ── 班別 / 人員 ── -->
    <div class="bg-white rounded-2xl shadow p-5 grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1">班別</label>
        <select id="shift" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="早班">早班</option>
          <option value="中班">中班</option>
          <option value="晚班">晚班</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1">點班人員</label>
        <input id="operator" type="text" placeholder="請輸入姓名"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <!-- ── 設備清單 ── -->
    <div class="bg-white rounded-2xl shadow p-5">
      <h2 class="text-base font-bold text-gray-700 mb-4">📋 設備清單</h2>
      <div id="equipList" class="space-y-3"></div>
    </div>

    <!-- ── 整體備註 ── -->
    <div class="bg-white rounded-2xl shadow p-5">
      <label class="block text-xs font-semibold text-gray-500 mb-1">整體備註</label>
      <textarea id="generalNote" rows="3" placeholder="如有異常請詳述…"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
    </div>

    <!-- ── 簽名 ── -->
    <div class="bg-white rounded-2xl shadow p-5">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-gray-500">點班人員簽名</span>
        <button type="button" onclick="clearSig()"
          class="text-xs text-red-400 hover:text-red-600 underline">清除</button>
      </div>
      <div class="border rounded-xl overflow-hidden bg-gray-50">
        <canvas id="sigCanvas" class="w-full" height="160"></canvas>
      </div>
    </div>

    <!-- ── 送出按鈕 ── -->
    <button type="button" onclick="submitForm()"
      class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-3 rounded-2xl shadow text-base transition-all">
      ✅ 送出點班紀錄
    </button>

  </form>

  <!-- ── 成功 Modal ── -->
  <div id="successModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-xl p-8 mx-6 text-center max-w-sm w-full">
      <div class="text-5xl mb-3">🎉</div>
      <h2 class="text-xl font-bold text-gray-800 mb-1">點班成功！</h2>
      <p class="text-sm text-gray-500 mb-6">紀錄已送出至 Google Sheets。</p>
      <button onclick="closeModal()"
        class="bg-blue-600 text-white px-8 py-2 rounded-xl hover:bg-blue-700 font-semibold">確認</button>
    </div>
  </div>

  <!-- ── 錯誤 Toast ── -->
  <div id="errToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-red-600 text-white text-sm px-5 py-3 rounded-xl shadow-lg z-50 hidden"></div>

<script>
// ────────────────────────────────────────────
// 0. GAS 端點
// ────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbxWtUyCuFy9b5a7BAgqlfAf8o4yZMOUbcs7D-mnU7x01-3i9Qeeu_2fdqgeURL8z1fp/exec";

// ────────────────────────────────────────────
// 1. 設備清單（可自行擴充）
// ────────────────────────────────────────────
const EQUIPMENT = [
  "空壓機",
  "輸送帶 A",
  "輸送帶 B",
  "注塑機 #1",
  "注塑機 #2",
  "冷卻水塔",
  "廢水處理設備",
  "消防偵煙系統",
  "UPS 不斷電系統",
  "監控攝影機組",
];

// ────────────────────────────────────────────
// 2. 即時時間
// ────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("nowTime").textContent =
    now.toLocaleString("zh-TW", { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

// ────────────────────────────────────────────
// 3. 動態產生設備列
// ────────────────────────────────────────────
const listEl = document.getElementById("equipList");

EQUIPMENT.forEach((name, i) => {
  const row = document.createElement("div");
  row.className = "flex flex-col sm:flex-row sm:items-center gap-2 border-b pb-3 last:border-0 last:pb-0";
  row.innerHTML = `
    <span class="flex-1 text-sm font-medium text-gray-700">${i + 1}. ${name}</span>
    <div class="flex gap-2">
      <button type="button"
        class="status-btn border rounded-lg px-3 py-1 text-xs font-semibold text-gray-600"
        data-idx="${i}" data-val="正常"
        onclick="setStatus(${i},'正常',this)">✔ 正常</button>
      <button type="button"
        class="status-btn border rounded-lg px-3 py-1 text-xs font-semibold text-gray-600"
        data-idx="${i}" data-val="故障"
        onclick="setStatus(${i},'故障',this)">✖ 故障</button>
    </div>
    <input type="text" placeholder="備註"
      id="note_${i}"
      class="border rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 w-full sm:w-40" />
  `;
  listEl.appendChild(row);
});

// 狀態記錄
const statusMap = {};
function setStatus(idx, val, btn) {
  statusMap[idx] = val;
  // 重設同組按鈕
  document.querySelectorAll(`[data-idx="${idx}"]`).forEach(b => {
    b.classList.remove("selected-ok", "selected-err",
      "bg-green-500","text-white","border-green-500",
      "bg-red-500","border-red-500");
    b.classList.add("text-gray-600");
  });
  // 高亮選中
  btn.classList.remove("text-gray-600");
  if (val === "正常") {
    btn.classList.add("bg-green-500","text-white","border-green-500");
  } else {
    btn.classList.add("bg-red-500","text-white","border-red-500");
  }
}

// ────────────────────────────────────────────
// 4. 簽名板
// ────────────────────────────────────────────
const canvas = document.getElementById("sigCanvas");
// 讓 canvas 實際像素配合 CSS 寬度
function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  const rect  = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * ratio;
  canvas.height = canvas.height * ratio;  // height 固定 160 × ratio
  canvas.getContext("2d").scale(ratio, ratio);
  sigPad.clear();
}
const sigPad = new SignaturePad(canvas, { penColor: "#1e3a5f" });
window.addEventListener("resize", resizeCanvas);
// 初始化需稍候 DOM 計算完
setTimeout(resizeCanvas, 100);

function clearSig() { sigPad.clear(); }

// ────────────────────────────────────────────
// 5. 送出
// ────────────────────────────────────────────
async function submitForm() {
  // 驗證
  const operator = document.getElementById("operator").value.trim();
  if (!operator) return showErr("請填寫點班人員姓名");

  const allChecked = EQUIPMENT.every((_, i) => statusMap[i]);
  if (!allChecked) return showErr("請為所有設備選擇狀態");

  if (sigPad.isEmpty()) return showErr("請完成簽名後再送出");

  // 組資料
  const rows = EQUIPMENT.map((name, i) => ({
    equipment: name,
    status: statusMap[i],
    note: document.getElementById(`note_${i}`).value.trim(),
  }));

  const payload = {
    timestamp: new Date().toLocaleString("zh-TW", { hour12: false }),
    shift:     document.getElementById("shift").value,
    operator,
    generalNote: document.getElementById("generalNote").value.trim(),
    signature:   sigPad.toDataURL("image/png"),
    items:       rows,
  };

  // 送出
  const btn = document.querySelector("button[onclick='submitForm()']");
  btn.disabled = true;
  btn.textContent = "送出中…";

  try {
    await fetch(GAS_URL, {
      method: "POST",
      mode:   "no-cors",          // GAS 需要 no-cors
      headers: { "Content-Type": "application/json" },
      body:   JSON.stringify(payload),
    });
    // no-cors 下無法讀取回應，視送出即成功
    showSuccess();
  } catch (e) {
    showErr("網路錯誤，請稍後再試：" + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "✅ 送出點班紀錄";
  }
}

// ────────────────────────────────────────────
// 6. UI 回饋
// ────────────────────────────────────────────
function showSuccess() {
  document.getElementById("successModal").classList.remove("hidden");
}
function closeModal() {
  document.getElementById("successModal").classList.add("hidden");
  resetForm();
}
function resetForm() {
  document.getElementById("operator").value = "";
  document.getElementById("generalNote").value = "";
  document.getElementById("shift").selectedIndex = 0;
  EQUIPMENT.forEach((_, i) => {
    delete statusMap[i];
    document.getElementById(`note_${i}`).value = "";
    document.querySelectorAll(`[data-idx="${i}"]`).forEach(b => {
      b.classList.remove("bg-green-500","text-white","border-green-500",
                         "bg-red-500","border-red-500");
      b.classList.add("text-gray-600");
    });
  });
  sigPad.clear();
}
function showErr(msg) {
  const t = document.getElementById("errToast");
  t.textContent = "⚠️ " + msg;
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 3500);
}
</script>
</body>
</html>
