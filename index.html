<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>8C神外病房－4號車點班</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#F5F0FF;font-family:'Noto Sans TC','PingFang TC',system-ui,sans-serif;padding:16px;color:#2D2A4A;}
    input,button{font-family:inherit;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.4}}
  </style>
</head>
<body>
<div id="root"></div>

<script>
// 使用純 JavaScript (React.createElement) 改寫，徹底解決網頁白屏問題
const { useState, useEffect } = React;
const e = React.createElement;

const GAS_URL = "https://script.google.com/macros/s/AKfycbxE6bj8H3B_iHLqIrHAKVyd3Cnr4141kLy9BX-qmPxARs7lyucKbSSXvhh8xv9FOqLD/exec";
const STORAGE_KEY = "ward_check_records_v4";

function loadRecords() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function saveRecords(recs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(recs)); } catch {}
}

const TRIPLE_ROOMS = [1, 2, 20, 21];
const SINGLE_ROOMS = [3, 5, 6, 17, 18, 19, 22];
const ROOM_CONFIG  = [];
for (let r = 1; r <= 22; r++) {
  if ([4,14].includes(r)) continue;
  if (TRIPLE_ROOMS.includes(r)) { ROOM_CONFIG.push({ room: r, subs: ["1","2","3"] }); continue; }
  if (SINGLE_ROOMS.includes(r)) { ROOM_CONFIG.push({ room: r, subs: [""]         }); continue; }
  ROOM_CONFIG.push({ room: r, subs: ["1","2"] });
}
const ALL_BEDS = [];
ROOM_CONFIG.forEach(({ room, subs }) => subs.forEach(s => ALL_BEDS.push(s ? `${room}-${s}` : `${room}`)));

const ITEMS_CONFIG = [
  { id: "blood_glucose", label: "血糖機",     icon: "🩸", type: "count_only", expected: 3, max: 3 },
  { id: "urine_sg",      label: "尿比重計",    icon: "🧪", type: "count_only", expected: 1, max: 1 },
  { id: "imec",          label: "I-MEC",       icon: "🖥️",  type: "split",     poolMax: 6  },
  { id: "ekg12",         label: "12導程 EKG",  icon: "❤️",  type: "count_only", expected: 1, max: 1 },
  { id: "ultrasound",    label: "100萬超音波",  icon: "🔊", type: "count_only", expected: 1, max: 1 },
  { id: "oximeter_pink", label: "Oximeter 粉", icon: "💗", type: "split",     poolMax: 3  },
  { id: "oximeter_blue", label: "Oximeter 藍", icon: "💙", type: "split",     poolMax: 2  },
  { id: "syringe_pump",  label: "空針幫浦",    icon: "💉", type: "split",     poolMax: 1  },
];

function defaultItems() {
  const o = {};
  ITEMS_CONFIG.forEach(c => { o[c.id] = { count:0, beds:[], loanCount:0, loanNote:"", note:"" }; });
  return o;
}
function itemsFromRecord(rec) {
  const o = defaultItems();
  (rec.items || []).forEach(it => {
    if (it.id) o[it.id] = { loanCount:0, loanNote:"", beds:[], note:"", ...it.value };
  });
  return o;
}

function effExpected(cfg, v) {
  if (cfg.type === "count_only" && cfg.expected != null) return Math.max(0, cfg.expected - (v.loanCount || 0));
  return null;
}
function effPoolMax(cfg, v) {
  if (cfg.type === "split") return Math.max(0, cfg.poolMax - (v.loanCount || 0));
  return cfg.poolMax;
}

const SHIFTS      = ["白班", "小夜", "大夜"];
const SHIFT_PREV  = { "白班": "大夜", "小夜": "白班", "大夜": "小夜" };
const SHIFT_EMOJI = ["☀️", "🌙", "⭐"];

const P = {
  bg:"#F5F0FF", card:"#FFFFFF", pri:"#7C5CBF", priL:"#EDE9FF", priD:"#5A3E9B",
  teal:"#2DB9AA", tealL:"#E0FAF7", coral:"#FF6B6B", coralL:"#FFF0F0",
  mint:"#51CF66", mintL:"#EBFBEE", amber:"#FCC419", amberL:"#FFF9DB",
  orange:"#FF922B", orangeL:"#FFF4E6", muted:"#9E9AB5", border:"#E4DEFF",
  s0bg:"#EAF8FF", s0bd:"#4DABF7", s1bg:"#FFF8E1", s1bd:"#FFA94D", s2bg:"#F0E6FF", s2bd:"#9775FA",
};
const SBGS = [P.s0bg, P.s1bg, P.s2bg];
const SBDS = [P.s0bd, P.s1bd, P.s2bd];

let _audioCtx = null;
function getCtx() { if (!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx; }
function beep(freq, type, dur, vol=0.18, delay=0) {
  try {
    const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type=type; o.frequency.value=freq;
    const t=ctx.currentTime+delay;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.01);
  } catch {}
}
const SFX = {
  tap:    ()=>beep(880,"sine",0.06,0.12),
  toggle: ()=>beep(660,"sine",0.08,0.15),
  plus:   ()=>beep(740,"triangle",0.07,0.14),
  minus:  ()=>beep(440,"triangle",0.07,0.12),
  bed:    ()=>beep(820,"sine",0.06,0.13),
  error:  ()=>{[0,0.2,0.4].forEach(d=>beep(180,"square",0.15,0.25,d));},
  success:()=>{[523,659,784,1046].forEach((f,i)=>beep(f,"sine",0.18,0.2,i*0.12));},
  nav:    ()=>beep(600,"sine",0.05,0.1),
  delete: ()=>beep(300,"sawtooth",0.1,0.2),
  modal:  ()=>beep(440,"sine",0.1,0.15),
  loan:   ()=>beep(550,"triangle",0.12,0.18),
};

function validate(items) {
  const errors = [];
  ITEMS_CONFIG.forEach(cfg => {
    const v = items[cfg.id] || { count:0, beds:[], loanCount:0 };
    const eff = effExpected(cfg, v);
    const eMax = effPoolMax(cfg, v);
    if (cfg.type === "count_only" && eff != null && (v.count||0) !== eff) {
      const lc = v.loanCount||0;
      errors.push({ id:cfg.id, msg:`【${cfg.label}】應有 ${eff} 台${lc>0?`（扣除外借 ${lc} 台）`:""}，現為 ${v.count||0} 台` });
    }
    if (cfg.type === "split") {
      const tot = (v.count||0)+(v.beds?.length||0);
      const lc = v.loanCount||0;
      const suffix = lc>0?`（總上限 ${cfg.poolMax}，外借 ${lc} 台）`:"";
      if (tot < eMax) errors.push({ id:cfg.id, msg:`【${cfg.label}】護理站 ${v.count||0} + 使用中 ${v.beds?.length||0} = ${tot}，尚差 ${eMax-tot} 台未交代${suffix}` });
      if (tot > eMax) errors.push({ id:cfg.id, msg:`【${cfg.label}】共 ${tot} 台超過有效上限 ${eMax}${suffix}` });
    }
  });
  return errors;
}

function ShiftTag({ shift }) {
  const i = SHIFTS.indexOf(shift);
  return e("span", { style: { background:SBGS[i], color:SBDS[i], border:`1.5px solid ${SBDS[i]}`, borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:700 } }, `${SHIFT_EMOJI[i]} ${shift}`);
}

function Modal({ title, body, onClose, type="error" }) {
  const col = type==="error"?P.coral:type==="warn"?P.amber:P.mint;
  const bg  = type==="error"?P.coralL:type==="warn"?P.amberL:P.mintL;
  const ico = type==="error"?"🧠💥":type==="warn"?"⚠️":"🎉";
  useEffect(()=>{ SFX.modal(); },[]);
  return e("div", { style: { position:"fixed",inset:0,background:"#2008",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:24 } },
    e("div", { style: { background:P.card,borderRadius:24,padding:28,maxWidth:400,width:"100%",boxShadow:"0 16px 48px #4004",border:`2px solid ${col}44` } },
      e("div", { style: { textAlign:"center",fontSize:52,marginBottom:8 } }, ico),
      e("div", { style: { fontWeight:800,fontSize:18,color:col,textAlign:"center",marginBottom:14,lineHeight:1.3 } }, title),
      e("div", { style: { background:bg,borderRadius:14,padding:14,marginBottom:18,border:`1px solid ${col}55` } }, 
        typeof body==="string" ? e("p", { style: { margin:0,fontSize:14,lineHeight:1.9 } }, body) : body
      ),
      e("button", { onClick:()=>{ SFX.tap(); onClose(); }, style: { width:"100%",padding:15,borderRadius:16,border:"none",background:col,color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer" } }, "我知道了 👍")
    )
  );
}

function ConfirmModal({ title, body, onConfirm, onCancel }) {
  useEffect(()=>{ SFX.modal(); },[]);
  return e("div", { style: { position:"fixed",inset:0,background:"#2008",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:24 } },
    e("div", { style: { background:P.card,borderRadius:24,padding:28,maxWidth:400,width:"100%",boxShadow:"0 16px 48px #4004" } },
      e("div", { style: { textAlign:"center",fontSize:48,marginBottom:8 } }, "🗑️"),
      e("div", { style: { fontWeight:800,fontSize:18,color:P.coral,textAlign:"center",marginBottom:12 } }, title),
      e("p", { style: { fontSize:14,color:P.muted,textAlign:"center",marginBottom:20 } }, body),
      e("div", { style: { display:"flex",gap:10 } },
        e("button", { onClick:()=>{ SFX.tap(); onCancel(); }, style: { flex:1,padding:13,borderRadius:14,border:`2px solid ${P.border}`,background:P.card,color:P.muted,fontWeight:700,fontSize:15,cursor:"pointer" } }, "取消"),
        e("button", { onClick:()=>{ SFX.delete(); onConfirm(); }, style: { flex:1,padding:13,borderRadius:14,border:"none",background:P.coral,color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer" } }, "確定刪除")
      )
    )
  );
}

function BedPicker({ selected, onChange, remaining }) {
  return e("div", null,
    e("div", { style: { fontSize:12,color:P.muted,marginBottom:6,display:"flex",alignItems:"center",gap:6 } }, 
      "🛏 選擇使用床號",
      e("span", { style: { fontWeight:700,color:remaining<=0?P.coral:P.teal,background:remaining<=0?P.coralL:P.tealL,borderRadius:20,padding:"1px 8px",fontSize:11 } }, `剩餘額度 ${remaining}`)
    ),
    e("div", { style: { maxHeight:200,overflowY:"auto",background:P.bg,borderRadius:12,padding:"8px 6px",border:`1px solid ${P.border}` } },
      ROOM_CONFIG.map(({ room, subs })=>
        e("div", { key: room, style: { display:"flex",alignItems:"center",flexWrap:"wrap",gap:4,marginBottom:5 } },
          e("span", { style: { fontSize:11,color:P.muted,width:30,textAlign:"right",flexShrink:0 } }, `${room}室`),
          subs.map(s=>{
            const label=s?`${room}-${s}`:`${room}`;
            const on=selected.includes(label), dis=!on&&remaining<=0;
            return e("button", { key: label, onClick:()=>{ if(dis)return; SFX.bed(); onChange(on?selected.filter(x=>x!==label):[...selected,label]); },
              style: { minWidth:46,height:34,borderRadius:10,fontSize:12,cursor:dis?"not-allowed":"pointer",
                border:`2px solid ${on?P.pri:P.border}`,background:on?P.pri:dis?"#F1EFF8":P.card,
                color:on?"#fff":dis?P.muted:"#333",fontWeight:on?700:400,opacity:dis?0.4:1,transition:"all .12s" } }, label);
          })
        )
      )
    )
  );
}

function cBtn(bg, color, disabled=false) {
  return { width:36,height:36,borderRadius:9,background:disabled?"#eee":bg,color:disabled?P.muted:color,
    border:`2px solid ${disabled?P.border:P.pri}`,fontWeight:800,fontSize:20,cursor:disabled?"not-allowed":"pointer",lineHeight:1,transition:"all .1s" };
}

function LoanRow({ v, onChange, maxLoan }) {
  const lc = v.loanCount || 0;
  const showNote = lc > 0;
  return e("div", { style: { background:P.orangeL, borderRadius:12, padding:"10px 12px", marginBottom:10, border:`1.5px solid ${P.orange}44` } },
    e("div", { style: { display:"flex", alignItems:"center", gap:8, marginBottom: showNote ? 8 : 0 } },
      e("span", { style: { fontSize:14 } }, "🔄"),
      e("span", { style: { fontSize:13, fontWeight:700, color:P.orange, flex:1 } }, "外借／維修台數"),
      e("button", { onClick:()=>{ SFX.loan(); onChange({ ...v, loanCount:Math.max(0,lc-1), loanNote: lc-1===0?"":v.loanNote }); }, style: cBtn(P.card, P.orange, lc===0) }, "−"),
      e("span", { style: { fontWeight:900,fontSize:20,minWidth:26,textAlign:"center",color:lc>0?P.orange:P.muted } }, lc),
      e("button", { onClick:()=>{ SFX.loan(); onChange({ ...v, loanCount:Math.min(lc+1, maxLoan) }); }, style: cBtn(P.orange, "#fff", lc>=maxLoan) }, "+")
    ),
    showNote && e("input", { value: v.loanNote||"", onChange: e=>onChange({ ...v, loanNote:e.target.value }), placeholder: "📋 說明（如：外借加護病房 / 維修中）",
      style: { width:"100%",padding:"7px 10px",borderRadius:9,border:`1.5px solid ${P.orange}88`,fontSize:12,boxSizing:"border-box",outline:"none",background:"#fff",color:"#5a3000" } })
  );
}

function SplitItemRow({ cfg, value, onChange, hasError }) {
  const v    = value || { count:0, beds:[], loanCount:0, loanNote:"", note:"" };
  const eMax = effPoolMax(cfg, v);
  const tot  = (v.count||0)+(v.beds?.length||0);
  const diff = eMax - tot;
  const bedRem = eMax - (v.count||0) - (v.beds?.length||0);

  function setCount(n) { onChange({ ...v, count:Math.max(0,Math.min(n, eMax-(v.beds?.length||0))) }); }
  function setBeds(beds) { onChange({ ...v, beds:beds.slice(0, eMax-(v.count||0)) }); }

  const statusColor = diff===0?P.mint:P.coral;
  const statusLabel = diff===0?`✓ 已全數交代 ${eMax} 台`:diff>0?`還差 ${diff} 台未交代`:`超出 ${-diff} 台`;
  const pct = eMax>0?Math.min(tot/eMax,1):tot>0?1:0;

  return e("div", { style: { background:hasError?P.coralL:P.card,borderRadius:16,padding:"14px 14px 10px",marginBottom:10,border:`2px solid ${hasError?P.coral:P.border}`,boxShadow:"0 2px 8px #7C5CBF11" } },
    e("div", { style: { display:"flex",alignItems:"center",gap:8,marginBottom:10 } },
      e("span", { style: { fontSize:22 } }, cfg.icon),
      e("span", { style: { flex:1,fontWeight:700,fontSize:15,color:"#2D2A4A" } }, cfg.label),
      e("span", { style: { fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:20,background:diff===0?P.mintL:P.coralL,color:statusColor,border:`1px solid ${statusColor}55` } }, statusLabel)
    ),
    e("div", { style: { display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8 } },
      e("div", { style: { background:P.priL,borderRadius:12,padding:"10px 12px",border:`1px solid ${P.border}` } },
        e("div", { style: { fontSize:12,color:P.pri,fontWeight:700,marginBottom:8 } }, "📦 數量（護理站）"),
        e("div", { style: { display:"flex",alignItems:"center",gap:8,justifyContent:"center" } },
          e("button", { onClick:()=>{ SFX.minus(); setCount((v.count||0)-1); }, style: cBtn(P.card,P.pri,(v.count||0)===0) }, "
